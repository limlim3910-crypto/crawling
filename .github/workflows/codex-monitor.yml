name: Codex Event Monitor Test

on:
  workflow_dispatch:
    inputs:
      include_seen:
        description: "테스트용: 이미 본 항목도 결과에 포함"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      reset_state:
        description: "테스트용: 중복 기록 초기화 후 실행"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  codex-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        working-directory: codex_event_tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 실행 설정 진단
        working-directory: codex_event_tool
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          python - <<'PY'
          from pathlib import Path
          import event_monitor_integrated as monitor

          config = monitor.read_config(Path("config.json"))
          catalog_cfg = config.get("source_catalog", {})
          catalog_path = Path(catalog_cfg.get("path", "data/official_sources.json"))
          sources, errors = monitor.build_source_list(config)
          print("merged_source_catalog:", catalog_cfg)
          print("official_sources_exists:", catalog_path.exists(), catalog_path)
          print("active_sources:", len(sources))
          print("active_source_types:", monitor.SOURCE_RUNTIME_STATS.get("active_source_types"))
          print("source_errors:", errors)
          PY

      - name: Codex 행사 모니터링 Dry Run
        working-directory: codex_event_tool
        env:
          TMAP_APP_KEY: ${{ secrets.TMAP_APP_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_SUBJECT_PREFIX: ${{ secrets.MAIL_SUBJECT_PREFIX }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.include_seen }}" = "true" ]; then
            ARGS="$ARGS --include-seen"
          fi
          if [ "${{ github.event.inputs.reset_state }}" = "true" ]; then
            ARGS="$ARGS --reset-state"
          fi
          echo "event_monitor_integrated.py args: ${ARGS:-'(none)'}"
          python event_monitor_integrated.py $ARGS

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-results
          path: |
            codex_event_tool/data/
            codex_event_tool/reports/
            codex_event_tool/state.json
            codex_event_tool/run_summary.json

      - name: Codex 결과 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add codex_event_tool/data/ codex_event_tool/reports/ codex_event_tool/state.json codex_event_tool/run_summary.json || true

          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            git commit -m "Update codex event monitor results"
            git push
          fi
