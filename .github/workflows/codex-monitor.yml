name: Codex Event Monitor Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  codex-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        working-directory: codex_event_tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Codex 행사 모니터링 Dry Run
        working-directory: codex_event_tool
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_SUBJECT_PREFIX: ${{ secrets.MAIL_SUBJECT_PREFIX }}
        run: |
          python event_monitor_integrated.py --dry-run

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-results
          path: |
            codex_event_tool/data/
            codex_event_tool/reports/
            codex_event_tool/state.json
            codex_event_tool/run_summary.json

      - name: Codex 결과 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add codex_event_tool/data/ codex_event_tool/reports/ codex_event_tool/state.json codex_event_tool/run_summary.json || true

          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            git commit -m "Update codex event monitor results"
            git push
          fi
