name: Event Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 부산시 페이지 다운로드
        run: |
          curl -L --http1.1 --retry 3 --retry-delay 5 \
            -A "Mozilla/5.0" \
            "https://www.busan.go.kr/nbnews" \
            -o busan_nbnews.html
      
      - name: 모니터링 실행
        env:
          HTML_FILE: busan_nbnews.html
        run: python monitor.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results
          path: data/
