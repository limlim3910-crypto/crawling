name: Event Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
permissions:
  contents: write
  
jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 부산시 페이지 다운로드
        run: |
          curl -L --http1.1 --retry 3 --retry-delay 5 \
            -A "Mozilla/5.0" \
            "https://www.busan.go.kr/nbnews" \
            -o busan_nbnews.html
      
      - name: 모니터링 실행
        env:
          HTML_FILE: busan_nbnews.html
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python monitor.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results
          path: data/
      - name: seen/results 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/seen.json data/results.json

          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            git commit -m "Update seen/results data"
            git push
          fi
