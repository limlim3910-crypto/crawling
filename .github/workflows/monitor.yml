name: Event Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 부산시 HTML 다운로드
        run: |
          curl -L --http1.1 --retry 5 --retry-delay 5 --connect-timeout 20 --fail \
            -A "Mozilla/5.0" \
            "https://www.busan.go.kr/nbnews" \
            -o busan_nbnews.html

      - name: 울산시 HTML 다운로드
        run: |
          curl -L --http1.1 --retry 5 --retry-delay 5 --connect-timeout 20 --fail \
            -A "Mozilla/5.0" \
            "https://www.ulsan.go.kr/u/rep/main.ulsan" \
            -o ulsan_main.html

      - name: 경상남도 HTML 다운로드
        run: |
          curl -L --http1.1 --retry 5 --retry-delay 5 --connect-timeout 20 --fail \
            -A "Mozilla/5.0" \
            "https://festa.gyeongnam.go.kr/" \
            -o gyeongnam_festa.html

      - name: 모니터링 실행
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python monitor.py

      - name: AI 요약 실행
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python enrich_with_ai.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results
          path: data/

      - name: seen/results/ai 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/seen.json data/results.json data/new_items.json data/enriched_items.json

          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            git commit -m "Update monitor data"
            git push
          fi
